<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Concert Diary">
<meta name="theme-color" content="#080808">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>Concert Diary 🎤</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:#080808;color:#fff;font-family:'DM Sans',sans-serif;overscroll-behavior:none}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:#111}
  ::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
  input,textarea,select{font-family:'DM Sans',sans-serif}
  input::placeholder,textarea::placeholder{color:#2e2e2e}
  input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.4)}
  input[type="time"]::-webkit-calendar-picker-indicator{filter:invert(0.4)}
  input[type="number"]::-webkit-inner-spin-button{opacity:0.3}
  select option{background:#111}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}

  :root{
    --accent:#FFD700;--accent2:#ffc300;
    --header-grad:linear-gradient(180deg,#0f0f0f 0%,#080808 100%);
    --badge-color:#000;
  }

  #app{min-height:100vh;display:flex;flex-direction:column}

  /* ── Header ── */
  .header{background:var(--header-grad);border-bottom:1px solid #151515;padding:env(safe-area-inset-top,0) 0 0;text-align:center;transition:background 0.5s}
  .header-inner{padding:28px 24px 20px}
  .header-eyebrow{font-size:10px;letter-spacing:4px;color:var(--accent);text-transform:uppercase;margin-bottom:10px}
  .header-title{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,5vw,3rem);font-weight:900;background:linear-gradient(135deg,#fff 30%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1;margin-bottom:6px}

  /* ── Motto ── */
  .year-motto-wrap{margin-top:5px;min-height:22px;position:relative;display:inline-block;cursor:pointer}
  .year-motto{color:#333;font-size:12px;padding:3px 10px;border-radius:20px;border:1px solid transparent;display:inline-block;transition:color 0.3s}
  .year-motto:hover{color:#555;border-color:#222}
  .year-motto.editing-mode{display:none}
  .year-motto-input{display:none;width:min(320px,80vw);background:#0d0d0d;border:1px solid var(--accent);border-radius:20px;padding:4px 14px;color:#ccc;font-size:12px;text-align:center;outline:none;font-family:'DM Sans',sans-serif;animation:fadeIn 0.15s ease}
  .year-motto-input.show{display:inline-block}
  .motto-hint{font-size:9px;color:#252525;margin-top:4px}

  /* ── Year selector ── */
  .year-selector{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:12px}
  .year-arrow{background:transparent;border:1px solid #2a2a2a;border-radius:50%;width:28px;height:28px;color:#666;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
  .year-arrow:hover{border-color:var(--accent);color:var(--accent)}
  .year-display{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--accent);font-weight:700;min-width:60px;text-align:center;cursor:pointer}

  /* ── Color swatches ── */
  .color-picker-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px}
  .color-swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform 0.15s,border-color 0.15s}
  .color-swatch:hover{transform:scale(1.2)}
  .color-swatch.active{border-color:#fff;transform:scale(1.15)}

  /* ── Stats ── */
  .stats{display:flex;justify-content:center;gap:16px;margin-top:16px;flex-wrap:wrap;padding-bottom:4px}
  .stat{text-align:center}
  .stat-val{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--accent);font-weight:700;line-height:1.2}
  .stat-lbl{font-size:9px;color:#3a3a3a;letter-spacing:1px;text-transform:uppercase;margin-top:2px}

  /* ── Top artist banner ── */
  .top-artist-bar{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;padding:8px 16px;background:var(--accent-dim,rgba(255,215,0,0.06));border:1px solid rgba(255,255,255,0.05);border-radius:12px;max-width:360px;margin-left:auto;margin-right:auto}
  .top-artist-icon{font-size:18px}
  .top-artist-label{font-size:9px;color:#444;letter-spacing:1px;text-transform:uppercase}
  .top-artist-name{font-family:'Playfair Display',serif;font-size:1rem;color:var(--accent);font-weight:700}
  .top-artist-count{font-size:10px;color:#555;margin-left:4px}

  /* ── Controls ── */
  .controls{max-width:960px;margin:0 auto;padding:16px 14px 0;width:100%}
  .controls-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .search-input{flex:1;min-width:120px;background:#0d0d0d;border:1px solid #1e1e1e;border-radius:8px;padding:9px 13px;color:#fff;font-size:13px;outline:none}
  .view-toggle{display:flex;border:1px solid #1e1e1e;border-radius:8px;overflow:hidden}
  .view-btn{padding:0 13px;height:38px;border:none;cursor:pointer;font-size:13px;transition:all 0.2s;display:flex;align-items:center;gap:4px}
  .view-btn.active{background:var(--accent);color:var(--badge-color);font-weight:700}
  .view-btn:not(.active){background:transparent;color:#444}
  .add-btn{background:var(--accent);color:var(--badge-color);border:none;border-radius:8px;padding:0 16px;height:38px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all 0.4s}
  .icon-btn{background:transparent;border:1px solid #1e1e1e;border-radius:8px;padding:0 12px;height:38px;font-size:18px;cursor:pointer;white-space:nowrap;transition:all 0.15s;display:flex;align-items:center;gap:5px}
  .icon-btn:hover{border-color:var(--accent)}
  .icon-btn span{font-size:11px;color:#666}
  .filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .filter-btn{padding:3px 11px;border-radius:20px;font-size:11px;cursor:pointer;transition:all 0.15s;border:1px solid #1e1e1e;background:transparent;color:#555}
  .filter-btn.active{background:var(--accent);color:var(--badge-color);border-color:var(--accent);font-weight:700}

  /* ── Section dividers (upcoming / past) ── */
  .section-divider{display:flex;align-items:center;gap:10px;margin:16px 0 10px}
  .section-divider-line{flex:1;height:1px;background:#1a1a1a}
  .section-divider-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap;padding:2px 10px;border-radius:20px;font-weight:600}
  .section-divider-label.upcoming{color:var(--accent);border:1px solid var(--accent);opacity:0.85}
  .section-divider-label.past{color:#444;border:1px solid #222}

  /* ── Countdown chip ── */
  .countdown-chip{display:inline-flex;align-items:center;gap:4px;background:var(--accent);color:var(--badge-color);border-radius:20px;padding:1px 8px;font-size:9px;font-weight:700;white-space:nowrap}
  .countdown-chip.soon{animation:blink 1.5s ease-in-out infinite}

  /* ── Content ── */
  .content{max-width:960px;margin:0 auto;padding:0 14px 80px;width:100%}
  .empty{text-align:center;padding:70px 20px;border:1px dashed #151515;border-radius:16px}
  .empty-icon{font-size:40px;margin-bottom:12px}
  .empty-txt{font-family:'Playfair Display',serif;font-size:1rem;color:#2a2a2a}
  .empty-sub{color:#1e1e1e;font-size:11px;margin-top:6px}

  /* ── Grid ── */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px}
  .grid-card{background:#111;border:1px solid #1e1e1e;border-radius:13px;overflow:hidden;cursor:pointer;transition:border-color 0.2s,transform 0.15s;display:flex;flex-direction:column}
  .grid-card:hover{border-color:var(--accent);transform:translateY(-3px)}
  .grid-card.upcoming-card{border-color:rgba(255,255,255,0.08)}
  .grid-poster{position:relative;padding-top:140%;background:#0a0a0a}
  .grid-poster img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .grid-poster-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;font-size:26px;color:#2a2a2a}
  .grid-poster-empty span{font-size:9px}
  .grid-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.9) 0%,transparent 55%)}
  .grid-badge-date{position:absolute;top:7px;left:7px;background:var(--accent);color:var(--badge-color);border-radius:5px;padding:2px 7px;font-size:9px;font-weight:800}
  .grid-badge-genre{position:absolute;top:7px;right:7px;background:rgba(0,0,0,0.65);border:1px solid #2a2a2a;color:#999;border-radius:20px;padding:2px 7px;font-size:9px}
  .grid-info{position:absolute;bottom:0;left:0;right:0;padding:8px 10px 7px}
  .grid-artist{font-family:'Playfair Display',serif;color:#fff;font-weight:700;font-size:0.82rem;line-height:1.25;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .grid-title{color:var(--accent);font-size:9px;margin-top:2px;opacity:0.9;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .grid-footer{padding:7px 10px;display:flex;align-items:center;justify-content:space-between;gap:4px;flex-wrap:wrap}
  .grid-venue{color:#444;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  .grid-time{color:var(--accent);font-size:9px;flex-shrink:0;opacity:0.8}

  /* ── List ── */
  .list{display:flex;flex-direction:column;gap:9px}
  .list-card{background:#111;border:1px solid #1e1e1e;border-radius:13px;overflow:hidden;cursor:pointer;transition:border-color 0.2s,transform 0.15s}
  .list-card:hover{border-color:var(--accent);transform:translateY(-2px)}
  .list-card.upcoming-card{border-color:rgba(255,255,255,0.07);background:#0f0f0f}
  .list-main{display:flex;align-items:center;gap:12px;padding:13px 15px}
  .list-thumb{width:52px;height:52px;border-radius:9px;overflow:hidden;flex-shrink:0;background:#0a0a0a;border:1px solid #1e1e1e;display:flex;align-items:center;justify-content:center;font-size:20px}
  .list-thumb img{width:100%;height:100%;object-fit:cover}
  .list-datebadge{min-width:40px;text-align:center;background:var(--accent);border-radius:8px;padding:5px 4px;color:var(--badge-color);flex-shrink:0;transition:background 0.4s,color 0.4s}
  .list-datebadge.past-badge{background:#1e1e1e;color:#555}
  .list-datebadge-m{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
  .list-datebadge-d{font-size:18px;font-weight:900;line-height:1}
  .list-info{flex:1;min-width:0}
  .list-artist{font-family:'Playfair Display',serif;font-size:0.92rem;color:#fff;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .list-concert-title{color:var(--accent);font-size:11px;margin-top:1px;opacity:0.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .list-venue{color:#444;font-size:11px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .list-showtime{color:var(--accent);font-size:10px;margin-top:2px;opacity:0.8}
  .list-right{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
  .list-genre{background:#1a1a1a;border:1px solid #222;border-radius:20px;padding:2px 9px;font-size:10px;color:#777}
  .list-expand{border-top:1px solid #1a1a1a;padding:13px 16px;background:#0d0d0d;animation:fadeIn 0.2s ease}
  .section-lbl{color:#3a3a3a;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
  .setlist-txt{color:#bbb;font-size:12px;line-height:1.9}
  .notes-txt{color:#999;font-size:12px;line-height:1.7;font-style:italic}
  .card-actions{display:flex;gap:7px;justify-content:flex-end;margin-top:9px}
  .action-btn{background:transparent;border:1px solid #1e1e1e;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;color:#444}
  .action-btn.danger{color:#ff4444;border-color:#ff4444}

  /* ── Modal ── */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(6px);padding:16px}
  .modal{background:#111;border:1px solid #2a2a2a;border-radius:18px;width:min(540px,100%);max-height:92vh;overflow-y:auto;box-shadow:0 0 80px rgba(255,215,0,0.07);animation:slideUp 0.25s ease}
  .modal-header{font-family:'Playfair Display',serif;color:var(--accent);font-size:1.3rem;padding:26px 28px 14px;border-bottom:1px solid #1e1e1e}
  .modal-body{padding:18px 28px 26px}
  .field{margin-bottom:13px}
  .field label{color:#555;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;display:block;margin-bottom:5px}
  .field input,.field textarea,.field select{width:100%;background:#0d0d0d;border:1px solid #1e1e1e;border-radius:8px;padding:9px 12px;color:#fff;font-size:13px;outline:none}
  .field textarea{resize:vertical}
  .field-grid{display:grid;gap:10px;margin-bottom:13px}
  .field-grid-3{grid-template-columns:1fr 1fr 1fr}
  .field-grid-2{grid-template-columns:1fr 1fr}
  .modal-footer{display:flex;gap:10px;justify-content:flex-end;padding-top:8px}
  .btn-primary{background:var(--accent);color:var(--badge-color);border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.4s}
  .btn-ghost{background:transparent;color:#555;border:1px solid #2a2a2a;border-radius:8px;padding:9px 18px;font-size:13px;cursor:pointer}
  .btn-danger{background:transparent;color:#ff4444;border:1px solid #ff4444;border-radius:8px;padding:9px 14px;font-size:12px;cursor:pointer}

  /* ── Poster upload ── */
  .poster-upload{display:flex;gap:14px;align-items:center;margin-top:6px}
  .poster-preview{position:relative}
  .poster-preview img{width:76px;height:76px;object-fit:cover;border-radius:9px;border:2px solid var(--accent);display:block}
  .poster-remove{position:absolute;top:-7px;right:-7px;width:20px;height:20px;border-radius:50%;background:#ff4444;border:none;color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .poster-placeholder{width:76px;height:76px;border-radius:9px;border:2px dashed #2a2a2a;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:#444;font-size:10px;gap:3px;transition:border-color 0.2s}
  .poster-placeholder:hover{border-color:var(--accent)}
  .poster-hint{color:#3a3a3a;font-size:10px;line-height:1.7}
  .photos-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  .photo-thumb{position:relative;width:64px;height:64px}
  .photo-thumb img{width:100%;height:100%;object-fit:cover;border-radius:8px;border:1px solid #2a2a2a;display:block}
  .photo-thumb-remove{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:#ff4444;border:none;color:#fff;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .photo-add{width:64px;height:64px;border-radius:8px;border:2px dashed #2a2a2a;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:#444;font-size:9px;gap:2px;transition:border-color 0.2s;flex-shrink:0}
  .photo-add:hover{border-color:var(--accent)}

  /* ── Detail modal ── */
  .detail-hero{position:relative;padding-top:52%;background:#0a0a0a;border-radius:18px 18px 0 0;overflow:hidden}
  .detail-hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .detail-hero-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:48px}
  .detail-hero-grad{position:absolute;inset:0;background:linear-gradient(to top,#111 0%,transparent 60%)}
  .detail-close{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.65);border:1px solid #333;color:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
  .detail-body{padding:18px 22px 26px}
  .detail-artist{font-family:'Playfair Display',serif;font-size:1.35rem;color:#fff;font-weight:900}
  .detail-title{color:var(--accent);font-size:12px;margin-top:3px;opacity:0.9}
  .detail-date{color:#444;font-size:11px;margin-top:3px}
  .detail-tags{display:flex;flex-wrap:wrap;gap:7px;margin:12px 0}
  .detail-tag{background:#1a1a1a;border:1px solid #1e1e1e;border-radius:20px;padding:4px 12px;font-size:11px;color:#999}
  .detail-photos{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  .detail-photos img{width:80px;height:80px;object-fit:cover;border-radius:9px;border:1px solid #2a2a2a;cursor:pointer}

  /* ── Lightbox ── */
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;z-index:300;cursor:pointer}
  .lightbox img{max-width:95vw;max-height:95vh;border-radius:12px;object-fit:contain}

  /* ── Toast ── */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:var(--badge-color);border-radius:20px;padding:9px 20px;font-size:13px;font-weight:700;z-index:200;animation:slideUp 0.3s ease;pointer-events:none;white-space:nowrap}

  .content{padding-bottom:calc(80px + env(safe-area-inset-bottom,0px))}

  @media(max-width:480px){
    .field-grid-3{grid-template-columns:1fr 1fr}
    .modal{border-radius:18px 18px 0 0;position:fixed;bottom:0;left:0;right:0;max-height:96vh;width:100%;margin:0}
    .overlay{align-items:flex-end;padding:0}
    .grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
  }
</style>
</head>
<body>
<div id="app">
  <div class="header" id="main-header">
    <div class="header-inner">
      <div class="header-eyebrow">Concert Diary · 演唱會紀錄</div>
      <h1 class="header-title">Concert Diary</h1>

      <!-- Editable motto -->
      <div class="year-motto-wrap" id="motto-wrap"
        ondblclick="startEditMotto()"
        ontouchstart="mottoTouchStart(event)"
        ontouchend="mottoTouchEnd(event)">
        <div class="year-motto" id="year-motto">記錄每一個與音樂相遇的夜晚</div>
        <input class="year-motto-input" id="motto-input" maxlength="60"
          placeholder="輸入這一年的總結…"
          onblur="saveMotto()" onkeydown="if(event.key==='Enter')saveMotto()">
        <div class="motto-hint" id="motto-hint">長按或雙擊年份可編輯年度總結</div>
      </div>

      <!-- Year selector -->
      <div class="year-selector">
        <button class="year-arrow" onclick="changeYear(-1)">‹</button>
        <div class="year-display" id="year-display"
          ondblclick="startEditMotto()"
          ontouchstart="mottoTouchStart(event)"
          ontouchend="mottoTouchEnd(event)"></div>
        <button class="year-arrow" onclick="changeYear(1)">›</button>
      </div>

      <!-- Colour picker -->
      <div class="color-picker-row" id="color-picker-row"></div>

      <!-- Stats -->
      <div class="stats" id="stats-bar" style="display:none"></div>

      <!-- Top artist -->
      <div id="top-artist-bar" style="display:none"></div>
    </div>
  </div>

  <div class="controls">
    <div class="controls-row">
      <input class="search-input" id="search" placeholder="搜尋演出者或場地…" oninput="render()">
      <div class="view-toggle">
        <button class="view-btn active" id="btn-grid" onclick="setView('grid')">⊞ 縮圖</button>
        <button class="view-btn" id="btn-list" onclick="setView('list')">☰ 列表</button>
      </div>
      <button class="add-btn" onclick="openModal()">＋ 新增</button>
      <button class="icon-btn" onclick="exportJSON()" id="export-btn" style="display:none">💾<span>匯出</span></button>
      <button class="icon-btn" onclick="document.getElementById('import-file').click()">📂<span>匯入</span></button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importJSON(event)">
    </div>
    <div class="filters" id="filters"></div>
  </div>

  <div class="content" id="content"></div>
</div>

<!-- Add/Edit Modal -->
<div class="overlay" id="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header" id="modal-title">🎤 新增演唱會</div>
    <div class="modal-body">
      <div class="field">
        <label>🖼 海報封面</label>
        <div class="poster-upload">
          <div id="poster-area"></div>
          <div class="poster-hint">支援 JPG / PNG<br>建議比例 1:1 或 2:3<br>縮圖將顯示於紀錄板</div>
          <input type="file" id="poster-file" accept="image/*" style="display:none" onchange="handlePoster(event)">
        </div>
      </div>
      <div class="field"><label>🎤 演出者 / 樂團 *</label><input id="f-artist" placeholder="e.g. 五月天"></div>
      <div class="field"><label>✨ 演唱會主題 Title</label><input id="f-title" placeholder="e.g. 諾亞方舟世界巡迴演唱會"></div>
      <div class="field"><label>📍 場地 *</label><input id="f-venue" placeholder="e.g. 台北小巨蛋"></div>
      <div class="field"><label>💺 座位 / 區域</label><input id="f-seat" placeholder="e.g. A區 3排 15號"></div>
      <div class="field-grid field-grid-2">
        <div class="field" style="margin:0"><label>📅 日期 *</label><input type="date" id="f-date"></div>
        <div class="field" style="margin:0"><label>🕐 演出時間</label><input type="time" id="f-showtime"></div>
      </div>
      <div class="field-grid field-grid-3">
        <div class="field" style="margin:0"><label>🎵 類型</label>
          <select id="f-genre">
            <option>流行</option><option>搖滾</option><option>電子</option><option>爵士</option>
            <option>古典</option><option>嘻哈</option><option>R&B</option><option>民謠</option>
            <option>Indie</option><option>音樂祭</option><option>FM</option><option>其他</option>
          </select>
        </div>
        <div class="field" style="margin:0"><label>⏱ 演出時長（分鐘）</label><input type="number" id="f-duration" min="0" max="1200" placeholder="e.g. 150"></div>
        <div class="field" style="margin:0"><label>🎟 票價（TWD）</label><input type="number" id="f-price" min="0" placeholder="e.g. 1800"></div>
      </div>
      <div class="field"><label>🎵 歌單 / 表演曲目</label><textarea id="f-setlist" rows="3" placeholder="逐行輸入歌名…"></textarea></div>
      <div class="field"><label>📝 備忘 / 回憶</label><textarea id="f-notes" rows="3" placeholder="記錄當天的感受、難忘的瞬間…"></textarea></div>
      <div class="field"><label>🗒 其他紀錄</label><textarea id="f-extra" rows="3" placeholder="交通、餐廳、同行好友、周邊購入…"></textarea></div>
      <div class="field">
        <label>📷 現場照片</label>
        <div class="photos-row" id="photos-row">
          <div class="photo-add" onclick="document.getElementById('photos-file').click()">
            <span style="font-size:20px">📷</span>新增照片
          </div>
        </div>
        <input type="file" id="photos-file" accept="image/*" multiple style="display:none" onchange="handlePhotos(event)">
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" onclick="closeModal()">取消</button>
        <button class="btn-primary" onclick="saveForm()">儲存紀錄</button>
      </div>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="overlay" id="detail-overlay" style="display:none" onclick="if(event.target===this)closeDetail()">
  <div class="modal" id="detail-modal"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" style="display:none" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="">
</div>

<script>
const STORAGE_KEY = 'concert_diary_v2';
const META_KEY    = 'concert_diary_meta';

let concerts     = [];
let meta         = {};
let currentFilter = 'all';
let currentView   = 'grid';
let selectedYear  = new Date().getFullYear();
let editingId     = null;
let formPoster    = '';
let formPhotos    = [];

/* ── Themes ── */
const THEMES = [
  { key:'gold',   accent:'#FFD700', accent2:'#ffc300', badge:'#000', grad:'linear-gradient(180deg,#0f0f0f 0%,#080808 100%)' },
  { key:'rose',   accent:'#FF6B8A', accent2:'#e5567a', badge:'#fff', grad:'linear-gradient(180deg,#1a0a0e 0%,#080808 100%)' },
  { key:'mint',   accent:'#3DFFC0', accent2:'#2ee8a8', badge:'#000', grad:'linear-gradient(180deg,#001a12 0%,#080808 100%)' },
  { key:'sky',    accent:'#60C8FF', accent2:'#45b8f0', badge:'#000', grad:'linear-gradient(180deg,#001a2a 0%,#080808 100%)' },
  { key:'violet', accent:'#C084FC', accent2:'#a855f7', badge:'#fff', grad:'linear-gradient(180deg,#12001a 0%,#080808 100%)' },
  { key:'amber',  accent:'#FB923C', accent2:'#f97316', badge:'#000', grad:'linear-gradient(180deg,#1a0800 0%,#080808 100%)' },
  { key:'coral',  accent:'#F87171', accent2:'#ef4444', badge:'#fff', grad:'linear-gradient(180deg,#1a0000 0%,#080808 100%)' },
  { key:'lime',   accent:'#A3E635', accent2:'#84cc16', badge:'#000', grad:'linear-gradient(180deg,#0a1a00 0%,#080808 100%)' },
];
function getTheme(yr){ const k=(meta[yr]||{}).color||'gold'; return THEMES.find(t=>t.key===k)||THEMES[0]; }
function applyTheme(yr){
  const t=getTheme(yr),r=document.documentElement;
  r.style.setProperty('--accent',t.accent);
  r.style.setProperty('--accent2',t.accent2);
  r.style.setProperty('--badge-color',t.badge);
  r.style.setProperty('--accent-dim',t.accent+'18');
  document.getElementById('main-header').style.background=t.grad;
}
function setYearColor(k){ if(!meta[selectedYear])meta[selectedYear]={}; meta[selectedYear].color=k; saveMeta();applyTheme(selectedYear);renderColorPicker(); }
function renderColorPicker(){
  const ak=(meta[selectedYear]||{}).color||'gold';
  document.getElementById('color-picker-row').innerHTML=THEMES.map(t=>
    `<div class="color-swatch${t.key===ak?' active':''}" style="background:${t.accent}" onclick="setYearColor('${t.key}')"></div>`).join('');
}

/* ── Storage ── */
function save(){ try{localStorage.setItem(STORAGE_KEY,JSON.stringify(concerts));}catch(e){} }
function saveMeta(){ try{localStorage.setItem(META_KEY,JSON.stringify(meta));}catch(e){} }
function load(){
  try{ const d=localStorage.getItem(STORAGE_KEY); if(d)concerts=JSON.parse(d);
    concerts=concerts.map(c=>({photos:[],price:'',extra:'',showtime:'',...c})); }catch(e){concerts=[];}
  try{ const m=localStorage.getItem(META_KEY); if(m)meta=JSON.parse(m); }catch(e){meta={};}
}

/* ── Helpers ── */
function formatDur(m){ if(!m||m<=0)return null; const h=Math.floor(m/60),r=m%60; if(!h)return`${r}分鐘`;if(!r)return`${h}小時`;return`${h}小時${r}分`; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function concertDateTime(c){
  if(!c.date)return null;
  if(c.showtime){ return new Date(`${c.date}T${c.showtime}`); }
  return new Date(c.date+'T23:59:59');
}
function isUpcoming(c){ const dt=concertDateTime(c); return dt && dt>new Date(); }
function daysUntil(c){
  const dt=concertDateTime(c); if(!dt)return null;
  const diff=dt-new Date(); if(diff<0)return null;
  return Math.ceil(diff/(1000*60*60*24));
}
function formatShowtime(t){ if(!t)return null; const [h,m]=t.split(':'); const hr=parseInt(h); const ampm=hr>=12?'PM':'AM'; return `${hr>12?hr-12:hr||12}:${m} ${ampm}`; }
function yearConcerts(yr){ return concerts.filter(c=>new Date(c.date).getFullYear()===(yr||selectedYear)); }
function filteredConcerts(){
  const q=document.getElementById('search').value.toLowerCase();
  return yearConcerts().filter(c=>{
    if(currentFilter!=='all'&&c.genre!==currentFilter)return false;
    if(q&&!c.artist.toLowerCase().includes(q)&&!c.venue.toLowerCase().includes(q))return false;
    return true;
  }).sort((a,b)=>concertDateTime(a)-concertDateTime(b));
}
function totalMins(yc){ return yc.reduce((s,c)=>s+(Number(c.duration)||0),0); }
function totalPrice(yc){ return yc.reduce((s,c)=>s+(Number(c.price)||0),0); }
function splitArtists(str){
  return str.split(/[\u3001\uff0c,\/&\xd7x]|feat\.|ft\./i)
    .map(a=>a.trim()).filter(Boolean);
}
function topArtist(yc){
  if(!yc.length)return null;
  const map={};
  yc.forEach(c=>{ splitArtists(c.artist).forEach(a=>{ map[a]=(map[a]||0)+1; }); });
  const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]);
  if(sorted[0][1]<2)return null;
  return {name:sorted[0][0],count:sorted[0][1]};
}

/* ── Motto ── */
let mottoTimer=null;
function mottoTouchStart(e){ mottoTimer=setTimeout(startEditMotto,600); }
function mottoTouchEnd(){ clearTimeout(mottoTimer); }
function startEditMotto(){
  const inp=document.getElementById('motto-input'),lbl=document.getElementById('year-motto'),hint=document.getElementById('motto-hint');
  inp.value=(meta[selectedYear]||{}).motto||'';
  lbl.classList.add('editing-mode'); inp.classList.add('show'); hint.style.display='none';
  inp.focus(); inp.select();
}
function saveMotto(){
  const inp=document.getElementById('motto-input'),lbl=document.getElementById('year-motto'),hint=document.getElementById('motto-hint');
  const val=inp.value.trim();
  if(!meta[selectedYear])meta[selectedYear]={};
  meta[selectedYear].motto=val; saveMeta();
  lbl.textContent=val||'記錄每一個與音樂相遇的夜晚';
  lbl.classList.remove('editing-mode'); inp.classList.remove('show'); hint.style.display='';
  toast('✏️ 年度總結已儲存');
}

/* ── Year ── */
function changeYear(d){ selectedYear+=d; currentFilter='all'; applyTheme(selectedYear); renderColorPicker(); renderMotto(); render(); }
function renderMotto(){
  const motto=(meta[selectedYear]||{}).motto||'';
  const lbl=document.getElementById('year-motto');
  lbl.textContent=motto||'記錄每一個與音樂相遇的夜晚';
  lbl.classList.remove('editing-mode');
  document.getElementById('motto-input').classList.remove('show');
  document.getElementById('motto-hint').style.display='';
}

/* ── Render ── */
function render(){
  const yc=yearConcerts();
  document.getElementById('year-display').textContent=selectedYear;

  // Stats
  const sb=document.getElementById('stats-bar');
  const tm=totalMins(yc),tp=totalPrice(yc),genres=new Set(yc.map(c=>c.genre)).size;
  const upcoming=yc.filter(c=>isUpcoming(c)).length;
  if(yc.length>0){
    sb.style.display='flex';
    const stats=[
      {l:'場次',v:yc.length},
      {l:'總演出時長',v:tm>0?formatDur(tm):'—'},
      {l:'音樂類型',v:genres},
    ];
    if(upcoming>0)stats.push({l:'即將到來',v:upcoming+'場'});
    if(tp>0)stats.push({l:'總票價',v:`$${tp.toLocaleString()}`});
    sb.innerHTML=stats.map(x=>`<div class="stat"><div class="stat-val">${x.v}</div><div class="stat-lbl">${x.l}</div></div>`).join('');
  }else{sb.style.display='none';}

  // Top artist
  const tab=document.getElementById('top-artist-bar');
  const ta=topArtist(yc);
  if(ta){
    tab.style.display='flex';
    tab.className='top-artist-bar';
    tab.innerHTML=`<span class="top-artist-icon">🏆</span><div><div class="top-artist-label">年度最常去</div><div><span class="top-artist-name">${esc(ta.name)}</span><span class="top-artist-count">× ${ta.count} 場</span></div></div>`;
  }else{tab.style.display='none';}

  document.getElementById('export-btn').style.display=concerts.length?'':'none';

  // Filters
  const usedGenres=[...new Set(yc.map(c=>c.genre))];
  const fEl=document.getElementById('filters');
  fEl.innerHTML=usedGenres.length?['all',...usedGenres].map(g=>`<button class="filter-btn${currentFilter===g?' active':''}" onclick="setFilter('${g}')">${g==='all'?'全部':g}</button>`).join(''):'';

  // Content
  const list=filteredConcerts();
  const cEl=document.getElementById('content');
  if(!list.length){
    cEl.innerHTML=`<div class="empty"><div class="empty-icon">🎸</div><div class="empty-txt">${yc.length===0?`${selectedYear} 年還沒有紀錄`:'沒有符合的紀錄'}</div>${yc.length===0?'<div class="empty-sub">點擊「＋ 新增」開始記錄你的演唱會旅程</div>':''}</div>`;
    return;
  }

  const upcomingList=list.filter(c=>isUpcoming(c));
  const pastList=list.filter(c=>!isUpcoming(c));

  if(currentView==='grid'){
    let html='';
    if(upcomingList.length){
      html+=`<div class="section-divider"><div class="section-divider-line"></div><div class="section-divider-label upcoming">🎯 即將到來</div><div class="section-divider-line"></div></div>`;
      html+=`<div class="grid">${upcomingList.map(c=>gridCard(c,true)).join('')}</div>`;
    }
    if(pastList.length){
      if(upcomingList.length)html+=`<div class="section-divider"><div class="section-divider-line"></div><div class="section-divider-label past">✓ 已結束</div><div class="section-divider-line"></div></div>`;
      html+=`<div class="grid">${pastList.map(c=>gridCard(c,false)).join('')}</div>`;
    }
    cEl.innerHTML=html;
  } else {
    let html='';
    if(upcomingList.length){
      html+=`<div class="section-divider"><div class="section-divider-line"></div><div class="section-divider-label upcoming">🎯 即將到來</div><div class="section-divider-line"></div></div>`;
      html+=`<div class="list">${upcomingList.map(c=>listCard(c,true)).join('')}</div>`;
    }
    if(pastList.length){
      if(upcomingList.length)html+=`<div class="section-divider"><div class="section-divider-line"></div><div class="section-divider-label past">✓ 已結束</div><div class="section-divider-line"></div></div>`;
      html+=`<div class="list">${pastList.map(c=>listCard(c,false)).join('')}</div>`;
    }
    cEl.innerHTML=html;
  }
}

function gridCard(c,upcoming){
  const d=new Date(c.date);
  const mmdd=d.toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'});
  const du=daysUntil(c);
  const chip=upcoming&&du!==null
    ?`<span class="countdown-chip${du<=3?' soon':''}">` +(du===0?'今天！':du===1?'明天':du+'天後')+`</span>`:'';
  return `<div class="grid-card${upcoming?' upcoming-card':''}" onclick="openDetail('${c.id}')">
    <div class="grid-poster">
      ${c.poster?`<img src="${c.poster}" alt="">`:`<div class="grid-poster-empty">🎤<span>無封面</span></div>`}
      <div class="grid-overlay"></div>
      <div class="grid-badge-date">${mmdd}</div>
      <div class="grid-badge-genre">${esc(c.genre)}</div>
      <div class="grid-info">
        <div class="grid-artist">${esc(c.artist)}</div>
        ${c.title?`<div class="grid-title">${esc(c.title)}</div>`:''}
      </div>
    </div>
    <div class="grid-footer">
      <div class="grid-venue">📍 ${esc(c.venue)}</div>
      ${c.showtime?`<div class="grid-time">🕐 ${formatShowtime(c.showtime)}</div>`:chip}
    </div>
  </div>`;
}

function listCard(c,upcoming){
  const d=new Date(c.date);
  const month=d.toLocaleString('zh-TW',{month:'short'});
  const day=d.getDate();
  const id=c.id;
  const du=daysUntil(c);
  const chip=upcoming&&du!==null
    ?`<span class="countdown-chip${du<=3?' soon':''}">` +(du===0?'今天！':du===1?'明天':du+'天後')+`</span>`:'';
  return `<div class="list-card${upcoming?' upcoming-card':''}" id="lc-${id}" onclick="toggleExpand('${id}')">
    <div class="list-main">
      <div class="list-thumb">${c.poster?`<img src="${c.poster}" alt="">`:'🎤'}</div>
      <div class="list-datebadge${upcoming?'':' past-badge'}">
        <div class="list-datebadge-m">${month}</div>
        <div class="list-datebadge-d">${day}</div>
      </div>
      <div class="list-info">
        <div class="list-artist">${esc(c.artist)}</div>
        ${c.title?`<div class="list-concert-title">${esc(c.title)}</div>`:''}
        <div class="list-venue">📍 ${esc(c.venue)}</div>
        ${c.showtime?`<div class="list-showtime">🕐 ${formatShowtime(c.showtime)}</div>`:''}
      </div>
      <div class="list-right">
        <span class="list-genre">${esc(c.genre)}</span>
        ${chip}
      </div>
    </div>
    <div id="lx-${id}" style="display:none"></div>
  </div>`;
}

function toggleExpand(id){
  const el=document.getElementById(`lx-${id}`);
  if(!el)return;
  if(el.style.display==='none'){
    const c=concerts.find(x=>x.id==id); if(!c)return;
    el.className='list-expand';
    el.innerHTML=`
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
        ${c.seat?`<span style="background:#1a1a1a;border:1px solid #222;border-radius:20px;padding:3px 10px;font-size:11px;color:#888">💺 ${esc(c.seat)}</span>`:''}
        ${c.showtime?`<span style="background:#1a1a1a;border:1px solid #222;border-radius:20px;padding:3px 10px;font-size:11px;color:#888">🕐 ${formatShowtime(c.showtime)}</span>`:''}
        ${Number(c.duration)>0?`<span style="background:#1a1a1a;border:1px solid #222;border-radius:20px;padding:3px 10px;font-size:11px;color:#888">⏱ ${formatDur(Number(c.duration))}</span>`:''}
        ${Number(c.price)>0?`<span style="background:#1a1a1a;border:1px solid #222;border-radius:20px;padding:3px 10px;font-size:11px;color:#888">🎟 $${Number(c.price).toLocaleString()}</span>`:''}
      </div>
      ${c.setlist?`<div style="margin-bottom:10px"><div class="section-lbl">🎵 歌單</div><div class="setlist-txt">${c.setlist.split('\n').filter(Boolean).map((s,i)=>`${i+1}. ${esc(s)}`).join('<br>')}</div></div>`:''}
      ${c.notes?`<div style="margin-bottom:10px"><div class="section-lbl">📝 備忘</div><div class="notes-txt">${esc(c.notes)}</div></div>`:''}
      ${c.extra?`<div style="margin-bottom:10px"><div class="section-lbl">🗒 其他紀錄</div><div class="notes-txt">${esc(c.extra)}</div></div>`:''}
      ${(c.photos&&c.photos.length)?`<div style="margin-bottom:10px"><div class="section-lbl">📷 現場照片</div><div class="detail-photos" style="margin-top:6px">${c.photos.map((p,i)=>`<img src="${p}" onclick="event.stopPropagation();openLightbox('${id}',${i})">`).join('')}</div></div>`:''}
      <div class="card-actions">
        <button class="action-btn" onclick="event.stopPropagation();openModal('${id}')">✏️ 編輯</button>
        <button class="action-btn danger" onclick="event.stopPropagation();deleteConcert('${id}')">🗑 刪除</button>
      </div>`;
    el.style.display='';
  }else{el.style.display='none';}
}

/* ── Detail ── */
function openDetail(id){
  const c=concerts.find(x=>x.id==id); if(!c)return;
  const d=new Date(c.date);
  const du=daysUntil(c);
  document.getElementById('detail-modal').innerHTML=`
    <div class="detail-hero">
      ${c.poster?`<img src="${c.poster}" alt="">`:`<div class="detail-hero-empty">🎤</div>`}
      <div class="detail-hero-grad"></div>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-body">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div style="min-width:0">
          <div class="detail-artist">${esc(c.artist)}</div>
          ${c.title?`<div class="detail-title">${esc(c.title)}</div>`:''}
          <div class="detail-date">${d.toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric'})}${c.showtime?` · 🕐 ${formatShowtime(c.showtime)}`:''}</div>
        </div>
        ${du!==null?`<span class="countdown-chip${du<=3?' soon':''}" style="flex-shrink:0">${du===0?'今天！':du===1?'明天':du+'天後'}</span>`:''}
      </div>
      <div class="detail-tags">
        <span class="detail-tag">📍 ${esc(c.venue)}${c.seat?` · ${esc(c.seat)}`:''}</span>
        <span class="detail-tag">🎵 ${esc(c.genre)}</span>
        ${Number(c.duration)>0?`<span class="detail-tag">⏱ ${formatDur(Number(c.duration))}</span>`:''}
        ${Number(c.price)>0?`<span class="detail-tag">🎟 $${Number(c.price).toLocaleString()}</span>`:''}
      </div>
      ${c.setlist?`<div style="margin-bottom:13px"><div class="section-lbl">🎵 歌單</div><div class="setlist-txt" style="margin-top:5px">${c.setlist.split('\n').filter(Boolean).map((s,i)=>`${i+1}. ${esc(s)}`).join('<br>')}</div></div>`:''}
      ${c.notes?`<div style="margin-bottom:13px"><div class="section-lbl">📝 備忘</div><div class="notes-txt" style="margin-top:5px">${esc(c.notes)}</div></div>`:''}
      ${c.extra?`<div style="margin-bottom:13px"><div class="section-lbl">🗒 其他紀錄</div><div class="notes-txt" style="margin-top:5px">${esc(c.extra)}</div></div>`:''}
      ${(c.photos&&c.photos.length)?`<div style="margin-bottom:13px"><div class="section-lbl">📷 現場照片</div><div class="detail-photos">${c.photos.map((p,i)=>`<img src="${p}" onclick="openLightbox('${c.id}',${i})">`).join('')}</div></div>`:''}
      <div class="modal-footer">
        <button class="btn-danger" onclick="deleteConcert('${c.id}');closeDetail()">🗑 刪除</button>
        <button class="btn-ghost" onclick="closeDetail()">關閉</button>
        <button class="btn-primary" onclick="closeDetail();openModal('${c.id}')">✏️ 編輯</button>
      </div>
    </div>`;
  document.getElementById('detail-overlay').style.display='flex';
}
function closeDetail(){ document.getElementById('detail-overlay').style.display='none'; }

/* ── Lightbox ── */
let lightboxPhotos=[];
function openLightbox(cid,idx){
  const c=concerts.find(x=>x.id==cid); if(!c||!c.photos||!c.photos.length)return;
  lightboxPhotos=c.photos;
  document.getElementById('lightbox-img').src=lightboxPhotos[idx];
  document.getElementById('lightbox').style.display='flex';
}
function closeLightbox(){ document.getElementById('lightbox').style.display='none'; }

/* ── Modal ── */
function openModal(id){
  editingId=id||null;
  const c=id?concerts.find(x=>x.id==id):null;
  document.getElementById('modal-title').textContent=c?'✏️ 編輯紀錄':'🎤 新增演唱會';
  document.getElementById('f-artist').value=c?.artist||'';
  document.getElementById('f-title').value=c?.title||'';
  document.getElementById('f-venue').value=c?.venue||'';
  document.getElementById('f-seat').value=c?.seat||'';
  document.getElementById('f-date').value=c?.date||'';
  document.getElementById('f-showtime').value=c?.showtime||'';
  document.getElementById('f-genre').value=c?.genre||'流行';
  document.getElementById('f-duration').value=c?.duration||'';
  document.getElementById('f-price').value=c?.price||'';
  document.getElementById('f-setlist').value=c?.setlist||'';
  document.getElementById('f-notes').value=c?.notes||'';
  document.getElementById('f-extra').value=c?.extra||'';
  formPoster=c?.poster||''; formPhotos=c?.photos?[...c.photos]:[];
  renderPoster(); renderPhotosRow();
  document.getElementById('modal-overlay').style.display='flex';
}
function closeModal(){ document.getElementById('modal-overlay').style.display='none'; editingId=null; }

function renderPoster(){
  const el=document.getElementById('poster-area');
  if(formPoster){
    el.className='poster-preview';
    el.innerHTML=`<img src="${formPoster}" alt=""><button class="poster-remove" onclick="event.stopPropagation();clearPoster()">✕</button>`;
    el.onclick=null;
  }else{
    el.className='poster-placeholder';
    el.innerHTML='<span style="font-size:22px">🖼</span>上傳圖片';
    el.onclick=()=>document.getElementById('poster-file').click();
  }
}
function handlePoster(e){
  const file=e.target.files[0]; if(!file)return;
  const r=new FileReader(); r.onload=ev=>{formPoster=ev.target.result;renderPoster();}; r.readAsDataURL(file); e.target.value='';
}
function clearPoster(){ formPoster=''; renderPoster(); }

function renderPhotosRow(){
  const row=document.getElementById('photos-row');
  row.innerHTML=formPhotos.map((p,i)=>`<div class="photo-thumb"><img src="${p}" alt=""><button class="photo-thumb-remove" onclick="removePhoto(${i})">✕</button></div>`).join('')
    +`<div class="photo-add" onclick="document.getElementById('photos-file').click()"><span style="font-size:20px">📷</span>新增照片</div>`;
}
function handlePhotos(e){
  const files=Array.from(e.target.files); let done=0;
  files.forEach(f=>{ const r=new FileReader(); r.onload=ev=>{formPhotos.push(ev.target.result);done++;if(done===files.length)renderPhotosRow();}; r.readAsDataURL(f); });
  e.target.value='';
}
function removePhoto(i){ formPhotos.splice(i,1); renderPhotosRow(); }

function saveForm(){
  const artist=document.getElementById('f-artist').value.trim();
  const venue=document.getElementById('f-venue').value.trim();
  const date=document.getElementById('f-date').value;
  if(!artist||!venue||!date){toast('⚠️ 請填寫演出者、場地及日期');return;}
  const obj={
    id:editingId||Date.now().toString(),
    artist,venue,date,
    showtime:document.getElementById('f-showtime').value,
    title:document.getElementById('f-title').value.trim(),
    seat:document.getElementById('f-seat').value.trim(),
    genre:document.getElementById('f-genre').value,
    duration:document.getElementById('f-duration').value,
    price:document.getElementById('f-price').value,
    setlist:document.getElementById('f-setlist').value.trim(),
    notes:document.getElementById('f-notes').value.trim(),
    extra:document.getElementById('f-extra').value.trim(),
    poster:formPoster,
    photos:[...formPhotos],
  };
  if(editingId){ const i=concerts.findIndex(c=>c.id==editingId); if(i>-1)concerts[i]=obj; }
  else{ concerts.push(obj); selectedYear=new Date(date).getFullYear(); applyTheme(selectedYear);renderColorPicker();renderMotto(); }
  save(); closeModal(); render();
  toast(editingId?'✅ 已更新紀錄':'🎉 已新增演唱會');
}

function deleteConcert(id){
  if(!confirm('確定要刪除這筆紀錄嗎？'))return;
  concerts=concerts.filter(c=>c.id!=id); save(); render(); toast('🗑 已刪除');
}

/* ── View / Filter ── */
function setView(v){
  currentView=v;
  document.getElementById('btn-grid').className='view-btn'+(v==='grid'?' active':'');
  document.getElementById('btn-list').className='view-btn'+(v==='list'?' active':'');
  render();
}
function setFilter(f){ currentFilter=f; render(); }

/* ── Export / Import ── */
function exportJSON(){
  const blob=new Blob([JSON.stringify({concerts,meta},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='concert-diary-backup.json'; a.click(); URL.revokeObjectURL(a.href);
  toast('💾 已匯出備份檔案');
}
function importJSON(e){
  const file=e.target.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(Array.isArray(data)){concerts=data.map(c=>({photos:[],price:'',extra:'',showtime:'',...c}));}
      else if(data.concerts){concerts=data.concerts.map(c=>({photos:[],price:'',extra:'',showtime:'',...c}));if(data.meta)meta=data.meta;}
      else throw new Error();
      save();saveMeta();applyTheme(selectedYear);renderColorPicker();renderMotto();render();
      toast(`📂 已匯入 ${concerts.length} 筆紀錄`);
    }catch{toast('⚠️ 檔案格式錯誤');}
  };
  r.readAsText(file); e.target.value='';
}

/* ── Toast ── */
function toast(msg){ const el=document.createElement('div'); el.className='toast'; el.textContent=msg; document.body.appendChild(el); setTimeout(()=>el.remove(),2800); }

/* ── Init ── */
load(); applyTheme(selectedYear); renderColorPicker(); renderMotto(); render();
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("./sw.js")}</script>
</body>
</html>
